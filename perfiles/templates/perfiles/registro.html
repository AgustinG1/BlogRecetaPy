{% extends "base.html" %}

{% block titulo %}<title>Crear cuenta - Blog de Recetas</title>{% endblock titulo %}

{% block contenido %}
<div class="form-page">
    <div class="form-card">
        <div class="text-center mb-4">
            <h1 class="form-card-title h3">Crear cuenta</h1>
            <p class="form-card-subtitle mb-0">Unite a nuestra comunidad de cocina</p>
        </div>

        <form method="post" class="site-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-person-plus me-2"></i>Registrarme</button>
            </div>
        </form>

        <div class="text-center mt-4">
            <p class="mb-0 text-muted">¿Ya tenés cuenta? <a href="{% url 'login' %}">Iniciá sesión</a></p>
        </div>
    </div>
</div>
{% endblock contenido %}
